<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VORA – MuleSoft AI Helper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e6e0;
    --accent: #0065ff;
    --accent-soft: #e8f0ff;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-muted: #a0a0a0;
    --user-bubble: #0065ff;
    --bot-bubble: #ffffff;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .chat-container {
    width: 100%;
    max-width: 440px;
    height: 90vh;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .chat-header {
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    z-index: 10;
  }

  .header-left h1 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-left p {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #10b981;
    border-radius: 50%;
  }

  #chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .message {
    max-width: 85%;
    font-size: 0.95rem;
    line-height: 1.5;
    position: relative;
  }

  .message.user {
    align-self: flex-end;
    background: var(--user-bubble);
    color: #fff;
    padding: 12px 18px;
    border-radius: 18px 18px 2px 18px;
  }

  .message.bot {
    align-self: flex-start;
    background: var(--bot-bubble);
    color: var(--text-primary);
    padding: 12px 18px;
    border-radius: 18px 18px 18px 2px;
    border: 1px solid var(--border);
  }

  pre {
    background: #2d2d2d;
    color: #f8f8f2;
    padding: 12px;
    border-radius: 8px;
    margin: 10px 0;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    overflow-x: auto;
  }

  .chat-footer {
    padding: 20px 24px 28px;
    background: #fff;
    border-top: 1px solid var(--border);
  }

  .suggestions {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .chip {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .chip:hover {
    background: #d0e1ff;
  }

  .input-area {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    background: var(--bg);
    padding: 8px 12px;
    border-radius: 16px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .input-area:focus-within {
    border-color: var(--accent);
    background: #fff;
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 8px 4px;
    max-height: 120px;
    color: var(--text-primary);
  }

  #send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.2s;
    margin-bottom: 2px;
  }

  #send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .typing {
    font-style: italic;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="header-left">
      <h1>VORA <span class="status-dot"></span></h1>
      <p>MuleSoft AI Helper</p>
    </div>
  </div>

  <div id="chat-history">
    <div class="message bot">
      Hi! I'm Vora, your MuleSoft specialist. How can I help you with Anypoint Platform or DataWeave today?
    </div>
  </div>

  <div class="chat-footer">
    <div class="suggestions" id="suggestions">
      <div class="chip" onclick="sendChip(this)">What is MuleSoft?</div>
      <div class="chip" onclick="sendChip(this)">DataWeave help</div>
      <div class="chip" onclick="sendChip(this)">API Design</div>
    </div>
    
    <div class="input-area">
      <textarea id="user-input" placeholder="Ask anything about MuleSoft..." rows="1"></textarea>
      <button id="send-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</div>

<script>
  // --- CONFIGURATION ---
  // PASTE YOUR GOOGLE GEMINI API KEY HERE
  const API_KEY = "AIzaSyAGTapwimIEzN5xNgG_8iuaKTRCgXfVrbs"; 

  const SYSTEM_PROMPT = `You are Vora, an expert MuleSoft AI assistant. 
  You provide deep technical help with:
  1. Mule 4 and Anypoint Platform.
  2. DataWeave 2.0 (always provide code snippets).
  3. API-Led Connectivity and RAML design.
  4. Error handling and CloudHub deployment.
  Keep responses professional, concise, and technical.`;

  const chatHistoryEl = document.getElementById('chat-history');
  const inputBox = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const suggestionsEl = document.getElementById('suggestions');

  let conversationHistory = [];
  let isLoading = false;

  inputBox.addEventListener('input', () => {
    inputBox.style.height = 'auto';
    inputBox.style.height = inputBox.scrollHeight + 'px';
  });

  inputBox.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMessage(role, text) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    
    // Simple markdown-ish formatting for code blocks
    if (text.includes('```')) {
      const parts = text.split('```');
      for (let i = 0; i < parts.length; i++) {
        if (i % 2 === 1) {
          const pre = document.createElement('pre');
          pre.textContent = parts[i].replace(/^[a-z]+\n/, '');
          msg.appendChild(pre);
        } else {
          const span = document.createElement('span');
          span.textContent = parts[i];
          msg.appendChild(span);
        }
      }
    } else {
      msg.textContent = text;
    }
    
    chatHistoryEl.appendChild(msg);
    chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
  }

  function showTyping() {
    const typing = document.createElement('div');
    typing.id = 'typing-msg';
    typing.className = 'typing';
    typing.textContent = 'Vora is thinking...';
    chatHistoryEl.appendChild(typing);
    chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
  }

  function sendChip(el) {
    inputBox.value = el.textContent;
    suggestionsEl.style.display = 'none';
    sendMessage();
  }

  async function sendMessage() {
    const text = inputBox.value.trim();
    if (!text || isLoading) return;

    if (API_KEY === "AIzaSyAGTapwimIEzN5xNgG_8iuaKTRCgXfVrbs") {
        addMessage('bot', 'Error: Please paste your Gemini API Key into the code (Line 345)!');
        return;
    }

    suggestionsEl.style.display = 'none';
    isLoading = true;
    sendBtn.disabled = true;
    inputBox.value = '';
    inputBox.style.height = 'auto';

    addMessage('user', text);
    
    // Format for Gemini API
    conversationHistory.push({ role: 'user', parts: [{ text: text }] });

    showTyping();

    try {const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,{ {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: conversationHistory,
          systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
        })
      });

      const data = await response.json();
      
      if (data.error) throw new Error(data.error.message);

      const reply = data.candidates[0].content.parts[0].text;

      removeTyping();
      addMessage('bot', reply);
      conversationHistory.push({ role: 'model', parts: [{ text: reply }] });

    } catch (err) {
      console.error(err);
      removeTyping();
      addMessage('bot', 'Error: ' + err.message + '. Make sure your API key is correct and CORS is allowed.');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
    }
  }
</script>

</body>
</html>
